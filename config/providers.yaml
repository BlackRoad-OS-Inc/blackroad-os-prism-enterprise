# Model provider configuration
# All AI/LLM traffic routes through LLM_URL (default: http://127.0.0.1:8000)
# which points to the lucidia-llm bridge running on your own infrastructure.
# Set LUCIDIA_BACKEND_URL in lucidia-llm to forward to your local model (e.g. Ollama).
providers:
  lucidia:
    display_name: "Lucidia (self-hosted)"
    env_key: "LLM_URL"
    route: "LLM_URL"
  blackboxprogramming:
    display_name: "BlackBox Programming (self-hosted)"
    env_key: "LLM_URL"
    route: "LLM_URL"
  openai:
    display_name: "OpenAI / ChatGPT"
    env_key: "OPENAI_API_KEY"
    route: "LLM_URL"
  anthropic:
    display_name: "Anthropic / Claude"
    env_key: "ANTHROPIC_API_KEY"
    route: "LLM_URL"
  google:
    display_name: "Google / Gemini"
    env_key: "GOOGLE_API_KEY"
    route: "LLM_URL"
  xai:
    display_name: "xAI / Grok"
    env_key: "XAI_API_KEY"
    route: "LLM_URL"
  holo:
    display_name: "Custom / Holo"
    env_key: "HOLO_API_KEY"
    route: "LLM_URL"
