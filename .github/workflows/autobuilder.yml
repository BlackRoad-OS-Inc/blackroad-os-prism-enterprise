# .github/workflows/autobuilder.yml
name: autobuilder
on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - run: npm install
      - name: Generate micro-fixes
        run: |
          npx tsx tools/autobuilder/make_fixes.js --index data/timemachine/index.json
      - name: Create PR
        continue-on-error: true
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        env:
          HUSKY: "0"
        with:
          commit-message: "autobuilder: perf+docs micro-fixes"
          title: "Autobuilder: perf+docs micro-fixes"
          labels: "autogen,canary:5%,low-risk"
          branch: "autobuilder/${{ github.run_id }}"
