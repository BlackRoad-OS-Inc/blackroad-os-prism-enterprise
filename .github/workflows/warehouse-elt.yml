name: Warehouse ELT (Nightly)
on:
  schedule: [{ cron: "20 2 * * *" }]
  workflow_dispatch:
jobs:
  elt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '20' }
      - run: npm install
      - name: Run warehouse ELT pipeline
        run: |
          for script in scripts/warehouse/ingest.js scripts/warehouse/stage.js scripts/warehouse/model.js scripts/warehouse/metrics_snapshot.js; do
            if [ -f "$script" ]; then
              echo "Running $script"
              node "$script"
            else
              echo "Skipping $script (not found)"
            fi
          done
