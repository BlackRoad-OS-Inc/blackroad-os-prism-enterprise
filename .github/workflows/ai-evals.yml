name: AI Evaluations (Nightly)
on:
  schedule: [{ cron: "25 2 * * *" }]
  workflow_dispatch:
jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '20' }
      - name: Run AI evaluations
        run: |
          if [ -f scripts/ai/run_evals.ts ]; then
            npx tsx scripts/ai/run_evals.ts
          else
            echo "Eval script not found (scripts/ai/run_evals.ts), skipping"
          fi
